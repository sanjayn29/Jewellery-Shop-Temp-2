<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle with gradient -->
  <circle cx="64" cy="64" r="60" fill="url(#goldGradient)" opacity="0.1"/>
  
  <!-- Diamond shape -->
  <path d="M64 20 L84 44 L64 88 L44 44 Z" fill="url(#goldGradient)" stroke="url(#goldStroke)" stroke-width="2"/>
  
  <!-- Diamond facets -->
  <path d="M64 20 L74 44 L64 88 Z" fill="url(#goldLightGradient)" opacity="0.6"/>
  <path d="M64 20 L54 44 L64 88 Z" fill="url(#goldDarkGradient)" opacity="0.4"/>
  
  <!-- Top facet lines -->
  <line x1="64" y1="20" x2="64" y2="44" stroke="url(#goldStroke)" stroke-width="1.5" opacity="0.8"/>
  <line x1="44" y1="44" x2="84" y2="44" stroke="url(#goldStroke)" stroke-width="1.5" opacity="0.8"/>
  <line x1="44" y1="44" x2="64" y2="20" stroke="url(#goldStroke)" stroke-width="1.5" opacity="0.6"/>
  <line x1="84" y1="44" x2="64" y2="20" stroke="url(#goldStroke)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Bottom facet lines -->
  <line x1="64" y1="44" x2="64" y2="88" stroke="url(#goldStroke)" stroke-width="1.5" opacity="0.8"/>
  <line x1="44" y1="44" x2="64" y2="88" stroke="url(#goldStroke)" stroke-width="1.5" opacity="0.6"/>
  <line x1="84" y1="44" x2="64" y2="88" stroke="url(#goldStroke)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Sparkle effects -->
  <circle cx="64" cy="20" r="3" fill="url(#sparkleGradient)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="44" r="2" fill="url(#sparkleGradient)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="84" cy="44" r="2" fill="url(#sparkleGradient)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="64" cy="88" r="3" fill="url(#sparkleGradient)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Letter M stylized as crown/jewel -->
  <path d="M40 95 L48 108 L56 98 L64 108 L72 98 L80 108 L88 95" 
        stroke="url(#goldStroke)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Small diamonds on crown -->
  <circle cx="48" cy="108" r="2" fill="url(#sparkleGradient)"/>
  <circle cx="64" cy="108" r="2" fill="url(#sparkleGradient)"/>
  <circle cx="80" cy="108" r="2" fill="url(#sparkleGradient)"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8992A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldLightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldDarkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8992A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="sparkleGradient">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.5" />
    </radialGradient>
  </defs>
</svg>
