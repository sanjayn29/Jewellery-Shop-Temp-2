<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer decorative circle -->
  <circle cx="64" cy="64" r="60" fill="url(#goldGradient)" opacity="0.12"/>
  
  <!-- Gold gemstone (topaz/citrine style) - more angular and realistic -->
  <path d="M64 16 L80 38 L76 50 L64 82 L52 50 L48 38 Z" fill="url(#goldGradient)" stroke="url(#goldStroke)" stroke-width="2"/>
  
  <!-- Gold facets for depth -->
  <path d="M64 16 L72 38 L64 82 Z" fill="url(#goldLightGradient)" opacity="0.6"/>
  <path d="M64 16 L56 38 L64 82 Z" fill="url(#amberGradient)" opacity="0.5"/>
  <path d="M56 38 L52 50 L64 82 Z" fill="url(#amberGradient)" opacity="0.5"/>
  <path d="M72 38 L76 50 L64 82 Z" fill="url(#goldLightGradient)" opacity="0.4"/>
  
  <!-- Internal facet lines -->
  <line x1="64" y1="16" x2="64" y2="38" stroke="#B8860B" stroke-width="1" opacity="0.6"/>
  <line x1="48" y1="38" x2="80" y2="38" stroke="#B8860B" stroke-width="1" opacity="0.6"/>
  <line x1="52" y1="50" x2="76" y2="50" stroke="#DAA520" stroke-width="1" opacity="0.5"/>
  <line x1="52" y1="50" x2="64" y2="82" stroke="#DAA520" stroke-width="1" opacity="0.5"/>
  <line x1="76" y1="50" x2="64" y2="82" stroke="#DAA520" stroke-width="1" opacity="0.5"/>
  
  <!-- Elegant highlights - golden shimmer -->
  <circle cx="64" cy="16" r="2" fill="url(#highlightGradient)" opacity="0.9"/>
  <circle cx="48" cy="38" r="1.5" fill="url(#highlightGradient)" opacity="0.7"/>
  <circle cx="80" cy="38" r="1.5" fill="url(#highlightGradient)" opacity="0.7"/>
  
  <!-- Letter M in art deco style below -->
  <path d="M40 98 L46 112 L52 102 L58 112 L64 102 L70 112 L76 102 L82 112 L88 98" 
        stroke="url(#goldStroke)" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Small gold accents on crown -->
  <circle cx="52" cy="102" r="2" fill="url(#goldGradient)"/>
  <circle cx="64" cy="102" r="2" fill="url(#goldGradient)"/>
  <circle cx="76" cy="102" r="2" fill="url(#goldGradient)"/>
  
  <!-- Art deco frame elements -->
  <rect x="32" y="92" width="2" height="24" fill="url(#goldGradient)" opacity="0.5"/>
  <rect x="94" y="92" width="2" height="24" fill="url(#goldGradient)" opacity="0.5"/>
  
  <!-- Gradients -->
  <defs>
    <!-- Main gold gradient for gemstone -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Light gold gradient for highlights -->
    <linearGradient id="goldLightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    
    <!-- Amber gradient for facets -->
    <linearGradient id="amberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFBF00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold stroke gradient -->
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Highlight gradient (bright shimmer) -->
    <radialGradient id="highlightGradient">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.6" />
    </radialGradient>
  </defs>
</svg>
